services:
  mysql:
    image: mysql:8.4
    container_name: ${COMPOSE_PROJECT_NAME:-inkblog}-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-inkblog}-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  release-sync:
    image: alpine:3.20
    container_name: ${COMPOSE_PROJECT_NAME:-inkblog}-release-sync
    environment:
      GH_RELEASE_REPO: ${GH_RELEASE_REPO:-}
      GH_RELEASE_TAG: ${GH_RELEASE_TAG:-deploy-latest}
      GH_RELEASE_TOKEN: ${GH_RELEASE_TOKEN:-}
      GH_RELEASE_PROXY_PREFIX: ${GH_RELEASE_PROXY_PREFIX:-https://gh-proxy.org}
      GH_RELEASE_DOWNLOAD_BASE: ${GH_RELEASE_DOWNLOAD_BASE:-}
      GH_RELEASE_CACHE_DIR: /github-release
      GH_RELEASE_EXTRACT_DIR: /release
      GH_RELEASE_BACKEND_ASSET: ${GH_RELEASE_BACKEND_ASSET:-backend_bundle.tar.gz}
      GH_RELEASE_BACKEND_SHA_ASSET: ${GH_RELEASE_BACKEND_SHA_ASSET:-backend_bundle.tar.gz.sha256}
      GH_RELEASE_WEB_ASSET: ${GH_RELEASE_WEB_ASSET:-web_bundle.tar.gz}
      GH_RELEASE_WEB_SHA_ASSET: ${GH_RELEASE_WEB_SHA_ASSET:-web_bundle.tar.gz.sha256}
      APK_REPO_URL: ${APK_REPO_URL:-}
    command:
      - /bin/sh
      - -c
      - /opt/github-release-sync.sh
    volumes:
      - ./deploy/release:/release
      - ./github-release:/github-release
      - ./scripts/github-release-sync.sh:/opt/github-release-sync.sh:ro
    restart: "no"

  backend:
    image: alpine:3.20
    container_name: ${COMPOSE_PROJECT_NAME:-inkblog}-backend
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NOTIFICATION_SERVICE_URL: http://notification:13160
      NOTIFICATION_SERVICE_TOKEN: ${NOTIFICATION_SERVICE_TOKEN}
    command:
      - /bin/sh
      - -c
      - |
        cd /app
        mkdir -p /app/runtime /app/uploads /app/logs
        ln -sf /app/runtime/config.json /app/config.json
        ln -sf /app/runtime/install.lock /app/install.lock
        if [ ! -x /app/release/bin/main ]; then
          echo "[backend] missing release binary /app/release/bin/main"
          exit 1
        fi
        exec /app/release/bin/main
    volumes:
      - ./deploy/runtime:/app/runtime
      - ./deploy/uploads:/app/uploads
      - ./deploy/logs:/app/logs
      - ./deploy/release:/app/release
    depends_on:
      release-sync:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:13150/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  notification:
    image: alpine:3.20
    container_name: ${COMPOSE_PROJECT_NAME:-inkblog}-notification
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NOTIFICATION_PORT: 13160
      NOTIFICATION_SERVICE_URL: http://notification:13160
      NOTIFICATION_SERVICE_TOKEN: ${NOTIFICATION_SERVICE_TOKEN}
      SERVICE_CONTROL_TOKEN: ${SERVICE_CONTROL_TOKEN}
    command:
      - /bin/sh
      - -c
      - |
        cd /app
        mkdir -p /app/runtime /app/logs
        ln -sf /app/runtime/config.json /app/config.json
        ln -sf /app/runtime/install.lock /app/install.lock
        until [ -f /app/runtime/install.lock ] && [ -f /app/runtime/config.json ]; do
          echo "[notification] waiting for install.lock and config.json"
          sleep 5
        done
        if [ ! -x /app/release/bin/notification ]; then
          echo "[notification] missing release binary /app/release/bin/notification"
          exit 1
        fi
        exec /app/release/bin/notification
    volumes:
      - ./deploy/runtime:/app/runtime
      - ./deploy/logs:/app/logs
      - ./deploy/release:/app/release
    depends_on:
      release-sync:
        condition: service_completed_successfully
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "[ ! -f /app/runtime/install.lock ] || [ ! -f /app/runtime/config.json ] || wget -qO- http://127.0.0.1:13160/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  core-control:
    image: alpine:3.20
    container_name: ${COMPOSE_PROJECT_NAME:-inkblog}-core-control
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      CORE_CONTROL_PORT: ${CORE_CONTROL_PORT:-13170}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-inkblog}
      SERVICE_CONTROL_TOKEN: ${SERVICE_CONTROL_TOKEN}
      DEPLOY_PUSH_TOKEN: ${DEPLOY_PUSH_TOKEN}
      DEPLOY_RELEASE_ROOT: ${DEPLOY_RELEASE_ROOT:-/app/release}
    command:
      - /bin/sh
      - -c
      - |
        cd /app
        mkdir -p /app/runtime /app/logs
        ln -sf /app/runtime/config.json /app/config.json
        ln -sf /app/runtime/install.lock /app/install.lock
        until [ -f /app/runtime/install.lock ] && [ -f /app/runtime/config.json ]; do
          echo "[core-control] waiting for install.lock and config.json"
          sleep 5
        done
        if [ ! -x /app/release/bin/core-control ]; then
          echo "[core-control] missing release binary /app/release/bin/core-control"
          exit 1
        fi
        exec /app/release/bin/core-control
    volumes:
      - ./deploy/runtime:/app/runtime
      - ./deploy/logs:/app/logs
      - ./deploy/release:/app/release
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      release-sync:
        condition: service_completed_successfully
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "[ ! -f /app/runtime/install.lock ] || [ ! -f /app/runtime/config.json ] || wget -qO- http://127.0.0.1:${CORE_CONTROL_PORT:-13170}/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-inkblog}-web
    command:
      - /bin/sh
      - -c
      - |
        if [ ! -f /app/release/web/index.html ]; then
          echo "[web] missing frontend release assets in /app/release/web"
          exit 1
        fi
        echo "[web] syncing release assets from /app/release/web"
        rm -rf /usr/share/nginx/html/*
        cp -r /app/release/web/. /usr/share/nginx/html/
        exec nginx -g 'daemon off;'
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./deploy/release:/app/release:ro
      - ./frontend/blog/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      release-sync:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
      notification:
        condition: service_started
      core-control:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
