name: Build And Push Deploy Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_to_server:
        description: "Push bundle to server deploy endpoint"
        required: false
        default: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
      DEPLOY_PUSH_TOKEN: ${{ secrets.DEPLOY_PUSH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/blog/package-lock.json

      - name: Build Backend Release Binaries
        working-directory: backend
        run: |
          mkdir -p ../release/bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../release/bin/main ./cmd/main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../release/bin/notification ./cmd/notification/main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../release/bin/core-control ./cmd/core-control/main.go

      - name: Build Frontend Dist
        working-directory: frontend/blog
        run: |
          npm ci
          npm run build
          mkdir -p ../../release/web
          cp -r dist/. ../../release/web/

      - name: Package Deploy Bundles
        run: |
          tar -C release/bin -czf release/backend_bundle.tar.gz main notification core-control
          tar -C release/web -czf release/web_bundle.tar.gz .
          sha256sum release/backend_bundle.tar.gz > release/backend_bundle.tar.gz.sha256
          sha256sum release/web_bundle.tar.gz > release/web_bundle.tar.gz.sha256

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundles-${{ github.sha }}
          path: |
            release/backend_bundle.tar.gz
            release/backend_bundle.tar.gz.sha256
            release/web_bundle.tar.gz
            release/web_bundle.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish Bundles To GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deploy-latest
          name: Deploy Latest
          body: |
            Auto-updated by CI.
            commit: ${{ github.sha }}
          files: |
            release/backend_bundle.tar.gz
            release/backend_bundle.tar.gz.sha256
            release/web_bundle.tar.gz
            release/web_bundle.tar.gz.sha256
          overwrite_files: true

      - name: Push Bundles To Server
        if: >-
          ${{
            env.DEPLOY_WEBHOOK_URL != '' &&
            env.DEPLOY_PUSH_TOKEN != '' &&
            (github.event_name == 'push' || github.event.inputs.push_to_server != 'false')
          }}
        env:
          VERSION_TAG: ${{ github.sha }}
        run: |
          curl -fS --retry 3 --retry-all-errors \
            -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Authorization: Bearer ${DEPLOY_PUSH_TOKEN}" \
            -F "version=${VERSION_TAG}" \
            -F "backend_bundle=@release/backend_bundle.tar.gz;type=application/gzip" \
            -F "web_bundle=@release/web_bundle.tar.gz;type=application/gzip"
